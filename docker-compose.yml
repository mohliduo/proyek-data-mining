# =============================================================
# docker-compose.yml — Stroke Risk Prediction (FastAPI + Streamlit)
#
# Mode default: PULL image dari Docker Hub (untuk VPS / production)
#   docker compose pull && docker compose up -d
#
# Untuk DEV LOKAL (build dari source), uncomment baris `build: .`
# dan comment baris `image:`
#
# Image: https://hub.docker.com/r/mohliduo/stroke-app
# Multi-arch: linux/amd64, linux/arm64
# =============================================================

services:
    api:
        image: mohliduo/stroke-app:1.0.1
        # build: .       # uncomment untuk dev lokal
        container_name: stroke-api
        restart: unless-stopped
        ports:
            - '127.0.0.1:9000:9000'
        environment:
            - OMP_NUM_THREADS=1
            - OPENBLAS_NUM_THREADS=1

    ui:
        image: mohliduo/stroke-app:1.0.1
        # build: .       # uncomment untuk dev lokal
        container_name: stroke-ui
        restart: unless-stopped
        # Konfigurasi Streamlit (port/address/XSRF/WS) ada di .streamlit/config.toml
        # yang sudah di-bake ke image — command jadi minimal.
        command: streamlit run src/app.py
        ports:
            - '127.0.0.1:8501:8501'
        environment:
            # UI memanggil API lewat docker DNS (container-to-container)
            - STROKE_API_URL=http://api:9000
        depends_on:
            - api
