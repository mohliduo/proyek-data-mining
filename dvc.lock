      size: 15407
    params:
      params.yaml:
        baselines:
          logreg:
            C: 1.0
            max_iter: 1000
            class_weight: balanced
            solver: liblinear
          random_forest:
            n_estimators: 300
            max_depth: 12
            min_samples_split: 5
            class_weight: balanced
            n_jobs: -1
          xgboost:
            n_estimators: 400
            max_depth: 6
            learning_rate: 0.05
            subsample: 0.9
            colsample_bytree: 0.9
            eval_metric: auc
            use_label_encoder: false
        dataset:
          name: healthcare-dataset-stroke-data
          source: Kaggle - fedesoriano/stroke-prediction-dataset
          target: stroke
          random_state: 42
        mlflow:
          experiment_name: stroke-risk-classification
          tracking_db: mlflow.db
          primary_metric: val_pr_auc
        tabnet:
          n_d: 16
          n_a: 16
          n_steps: 5
          gamma: 1.5
          lambda_sparse: 0.0001
          max_epochs: 200
          patience: 25
          batch_size: 1024
          virtual_batch_size: 128
